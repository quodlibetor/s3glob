name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  test-integration:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Compile tests
        run: cargo nextest run --verbose --no-run

      - name: Run integration tests
        env:
          S3GLOB_LOG: trace
          S3GLOB_LOG_DIR: ${{ github.workspace }}/integration-logs
          S3GLOB_TRACE_CHROME_DIR: ${{ github.workspace }}/trace-chrome
        run: cargo nextest run --no-fail-fast -E 'binary(integration)'

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: integration-logs/
          if-no-files-found: ignore

      - name: Upload Chrome trace artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-trace-chrome
          path: trace-chrome/
          if-no-files-found: ignore

  test-integration-no-artifacts:
    name: Integration Test (no log/trace output)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Compile tests
        run: cargo nextest run --verbose --no-run

      - name: Run integration tests
        run: cargo nextest run --no-fail-fast -E 'binary(integration)'

  test-unit:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Compile tests
        run: cargo nextest run --verbose --no-run

      - name: Run unit tests
        run: cargo nextest run --no-fail-fast -E 'not binary(integration)'
